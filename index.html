<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smore to Explore</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg:
        radial-gradient(circle at top, rgba(255, 207, 140, 0.32), transparent 24%),
        radial-gradient(circle at 85% 10%, rgba(103, 167, 200, 0.18), transparent 24%),
        linear-gradient(180deg, #fdf3e5 0%, #f1dfbf 48%, #e3ca9f 100%);
      --font-ui: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      background: #ead6b1;
      font-family: var(--font-ui);
    }

    body {
      background: var(--page-bg);
      color: #2f261f;
    }

    body.fullscreen-mode {
      overflow: hidden;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      padding:
        max(4px, env(safe-area-inset-top))
        max(4px, env(safe-area-inset-right))
        max(4px, env(safe-area-inset-bottom))
        max(4px, env(safe-area-inset-left));
      display: grid;
      place-items: stretch;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      border-radius: clamp(10px, 2vw, 18px);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 18%),
        linear-gradient(180deg, rgba(255, 250, 241, 0.94), rgba(242, 230, 207, 0.92));
      box-shadow:
        0 14px 28px rgba(61, 40, 22, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.45);
      touch-action: none;
    }

    .fallback {
      position: absolute;
      inset: auto 12px 12px;
      max-width: 420px;
      padding: 0.8rem 1rem;
      border-radius: 16px;
      background: rgba(255, 248, 239, 0.9);
      border: 1px solid rgba(95, 70, 51, 0.16);
      color: #4a3424;
      font-size: 0.9rem;
      line-height: 1.4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .fallback.visible {
      opacity: 1;
    }

    .name-editor-shell {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      pointer-events: none;
      z-index: 3;
    }

    .name-editor-shell.visible {
      display: flex;
      pointer-events: auto;
    }

    .name-editor-card {
      width: min(420px, 100%);
      max-height: min(760px, calc(100dvh - 36px));
      border-radius: 24px;
      border: 10px solid #8c5d35;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(244, 233, 216, 0.96));
      box-shadow: 0 18px 44px rgba(61, 40, 22, 0.22);
      padding: 18px;
      color: #432f20;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 18px 44px rgba(61, 40, 22, 0.22),
        inset 0 0 0 3px rgba(214, 177, 124, 0.6),
        inset 0 0 0 6px rgba(113, 71, 39, 0.38);
    }

    .name-editor-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      pointer-events: none;
      background:
        radial-gradient(circle at 18px 18px, rgba(224, 186, 128, 0.78) 0 6px, transparent 6.5px),
        radial-gradient(circle at calc(100% - 18px) 18px, rgba(224, 186, 128, 0.78) 0 6px, transparent 6.5px),
        radial-gradient(circle at 18px calc(100% - 18px), rgba(224, 186, 128, 0.78) 0 6px, transparent 6.5px),
        radial-gradient(circle at calc(100% - 18px) calc(100% - 18px), rgba(224, 186, 128, 0.78) 0 6px, transparent 6.5px);
    }

    .name-editor-card h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .name-editor-card p {
      margin: 0 0 14px;
      font-size: 0.95rem;
      line-height: 1.4;
      color: rgba(67, 47, 32, 0.82);
    }

    .name-editor-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
      overflow-y: auto;
      padding-right: 4px;
      min-height: 0;
    }

    .name-editor-field {
      display: grid;
      gap: 6px;
      padding: 10px 12px 12px;
      border-radius: 18px;
      border: 1px solid var(--player-soft, rgba(108, 80, 54, 0.14));
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(248, 240, 228, 0.92));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .name-editor-field label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--player-fill, rgba(67, 47, 32, 0.76));
    }

    .name-editor-swatch {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--player-fill, #8d5a36);
      box-shadow:
        0 0 0 3px var(--player-glow, rgba(141, 90, 54, 0.18)),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
      flex: 0 0 auto;
    }

    .name-editor-field input {
      width: 100%;
      border: 1px solid var(--player-fill, rgba(108, 80, 54, 0.18));
      border-radius: 14px;
      background: rgba(255, 252, 246, 0.98);
      color: #352518;
      padding: 0.72rem 0.85rem;
      font: 600 1rem/1.2 var(--font-ui);
      outline: none;
      box-shadow:
        0 0 0 3px var(--player-glow, rgba(202, 111, 54, 0.16)),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    .name-editor-field input:focus {
      border-color: var(--player-fill, rgba(202, 111, 54, 0.88));
      box-shadow:
        0 0 0 4px var(--player-glow, rgba(202, 111, 54, 0.22)),
        0 10px 18px var(--player-shadow, rgba(202, 111, 54, 0.18));
    }

    .name-editor-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      padding-top: 4px;
      background: rgba(255, 248, 239, 0.98);
    }

    .name-editor-actions button {
      border: 1px solid rgba(108, 80, 54, 0.18);
      border-radius: 999px;
      padding: 0.68rem 1rem;
      font: 700 0.98rem/1 var(--font-ui);
      cursor: pointer;
      color: #4a3524;
      background: rgba(247, 236, 220, 0.98);
    }

    .name-editor-actions button.primary {
      background: #ca6f36;
      border-color: #995127;
      color: #fff8f1;
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <canvas id="gameCanvas" aria-label="Smore to Explore game board"></canvas>
    <div class="name-editor-shell" id="nameEditorHost" hidden aria-hidden="true"></div>
    <div class="fallback" id="fallbackMessage">
      This browser does not support the canvas features Smore to Explore needs.
    </div>
  </div>

  <script defer src="./smore-core.js"></script>
  <script defer src="./smore-objectives.js"></script>
  <script defer src="./smore-space.js"></script>
</body>
</html>
