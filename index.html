<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smore to Explore</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg:
        radial-gradient(circle at top, rgba(255, 207, 140, 0.32), transparent 24%),
        radial-gradient(circle at 85% 10%, rgba(103, 167, 200, 0.18), transparent 24%),
        linear-gradient(180deg, #fdf3e5 0%, #f1dfbf 48%, #e3ca9f 100%);
      --font-ui: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #ead6b1;
      font-family: var(--font-ui);
    }

    body {
      background: var(--page-bg);
      color: #2f261f;
    }

    body.fullscreen-mode {
      overflow: hidden;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      display: grid;
      place-items: stretch;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      border-radius: 26px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 18%),
        linear-gradient(180deg, rgba(255, 250, 241, 0.94), rgba(242, 230, 207, 0.92));
      box-shadow:
        0 24px 60px rgba(61, 40, 22, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.45);
      touch-action: none;
    }

    .fallback {
      position: absolute;
      inset: auto 12px 12px;
      max-width: 420px;
      padding: 0.8rem 1rem;
      border-radius: 16px;
      background: rgba(255, 248, 239, 0.9);
      border: 1px solid rgba(95, 70, 51, 0.16);
      color: #4a3424;
      font-size: 0.9rem;
      line-height: 1.4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .fallback.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <canvas id="gameCanvas" aria-label="Smore to Explore game board"></canvas>
    <div class="fallback" id="fallbackMessage">
      This browser does not support the canvas features Smore to Explore needs.
    </div>
  </div>

  <script defer src="./smore-core.js"></script>
  <script defer src="./smore-objectives.js"></script>
  <script defer src="./smore-space.js"></script>
</body>
</html>
